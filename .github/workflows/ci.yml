name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify backend/frontend version literals match
        # Catches the drift that silently shipped v1.3.32 → v1.4.2 with
        # backend/pyproject.toml stuck at 1.3.31 (so /api/health lied
        # about the running version for 4 minor releases). The script
        # also flags CHANGELOG.md and the in-app Changelog.tsx if their
        # top entry doesn't match the source-of-truth backend version.
        run: python scripts/check_version_sync.py

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Create empty frontend dist (hatchling force-include)
        # The backend wheel pulls in ../frontend/dist via force-include so a
        # production install bundles the SPA. CI runs the backend job in
        # parallel with the frontend job, so the dist directory may not exist
        # yet — create an empty placeholder so the editable install succeeds.
        run: |
          mkdir -p ../frontend/dist
          touch ../frontend/dist/.gitkeep

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Run tests with pytest
        run: pytest

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
